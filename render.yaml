services:
  # ─── ColdCraft AI (Backend + Frontend bundled) ──────
  - type: web
    name: coldcraft-ai
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && VITE_API_URL= npm run build && cd ../backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: ColdCraft
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
    healthCheckPath: /api/health
